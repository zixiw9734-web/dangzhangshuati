<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>《党章》知识题库</title>
    <style>
        :root {
            --primary-red: #DA251D;    
            --primary-red-hover: #C01D16;
            --primary-gold: #D4AF37;   
            --bg-color: #F5F7FA;       
            --card-bg: #FFFFFF;        
            --text-main: #2C3E50;      
            --text-desc: #5C6A79;      
            --border-color: #E2E8F0;
            --success-color: #10B981;  
            --error-color: #EF4444;    
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* 左侧答题卡 */
        .sidebar { width: 280px; background-color: var(--card-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.03); z-index: 100; flex-shrink: 0; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-color); text-align: center; }
        .sidebar-header h2 { font-size: 18px; color: var(--primary-red); margin-bottom: 15px; }
        .stat-box { display: flex; justify-content: space-around; font-size: 14px; color: var(--text-desc); }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-value { font-size: 18px; font-weight: bold; margin-top: 5px; color: var(--text-main); }
        .stat-value.acc { color: var(--success-color); }
        
        .question-matrix { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .matrix-title { font-size: 14px; font-weight: bold; color: var(--text-desc); margin: 15px 0 10px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .matrix-title:first-child { margin-top: 0; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .grid-item { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s; color: var(--text-desc); }
        .grid-item:hover { border-color: var(--primary-gold); color: var(--primary-gold); }
        .grid-item.active { box-shadow: 0 0 0 2px var(--primary-gold); font-weight: bold; }
        .grid-item.correct { background-color: var(--success-color); border-color: var(--success-color); color: white; }
        .grid-item.error { background-color: var(--error-color); border-color: var(--error-color); color: white; }

        /* 右侧刷题区 */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .top-nav { padding: 15px 30px; background: white; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .q-type-badge { background-color: rgba(218, 37, 29, 0.1); color: var(--primary-red); padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        
        .quiz-container { flex-grow: 1; overflow-y: auto; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        .quiz-card { background: var(--card-bg); width: 100%; max-width: 800px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 30px; margin-bottom: 20px; }
        
        .question { font-size: 17px; line-height: 1.6; font-weight: bold; margin-bottom: 25px; }
        
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option { padding: 14px 18px; border: 2px solid var(--border-color); border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 15px; display: flex; align-items: center; line-height: 1.4; }
        .option:hover:not(.disabled) { border-color: var(--primary-gold); background-color: rgba(212, 175, 55, 0.05); }
        .option.selected { border-color: var(--primary-gold); background-color: rgba(212, 175, 55, 0.1); font-weight: bold; }
        
        .option.correct-ans { border-color: var(--success-color); background-color: rgba(16, 185, 129, 0.1); color: #065F46; font-weight: bold; }
        .option.wrong-ans { border-color: var(--error-color); background-color: rgba(239, 68, 68, 0.1); color: #991B1B; }
        .option.disabled { cursor: not-allowed; }

        .option-letter { width: 30px; font-weight: bold; color: var(--text-desc); flex-shrink: 0;}
        .option.correct-ans .option-letter, .option.wrong-ans .option-letter { color: inherit; }

        .actions { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 800px; padding-bottom: 30px; }
        .btn { padding: 12px 25px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-outline { background: white; border: 2px solid var(--border-color); color: var(--text-desc); }
        .btn-outline:hover:not(:disabled) { border-color: var(--primary-gold); color: var(--primary-gold); }
        .btn-primary { background: var(--primary-red); color: white; box-shadow: 0 4px 10px rgba(218, 37, 29, 0.3); }
        .btn-primary:hover:not(:disabled) { background: var(--primary-red-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .explanation { margin-top: 20px; padding: 15px; background-color: #F8FAFC; border-left: 4px solid var(--primary-gold); border-radius: 4px; font-size: 14px; color: var(--text-desc); display: none; line-height: 1.6; }
        .explanation.show { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* 移动端/平板竖屏适配 */
        .menu-toggle { display: none; background: transparent; color: var(--primary-red); border: 2px solid var(--primary-red); padding: 6px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .mask { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index: 50; }
        
        @media (max-width: 850px) {
            .sidebar { position: absolute; left: -280px; height: 100%; transition: left 0.3s ease; }
            .sidebar.open { left: 0; }
            .mask.show { display: block; }
            .menu-toggle { display: block; }
            .top-nav { padding: 15px; }
            .quiz-container { padding: 15px; }
            .quiz-card { padding: 20px; }
            .actions { gap: 10px; }
            .btn { padding: 12px 15px; flex: 1; text-align: center;}
        }
    </style>
</head>
<body>

    <!-- 手机端遮罩层 -->
    <div class="mask" id="mask" onclick="toggleSidebar()"></div>

    <!-- 左侧答题卡 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>《党章》刷题系统</h2>
            <div class="stat-box">
                <div class="stat-item">
                    <span>已做</span>
                    <span class="stat-value" id="statDone">0/102</span>
                </div>
                <div class="stat-item">
                    <span>正确率</span>
                    <span class="stat-value acc" id="statAcc">0%</span>
                </div>
            </div>
        </div>
        <div class="question-matrix" id="qMatrix"></div>
    </div>

    <!-- 右侧内容 -->
    <div class="main-content">
        <div class="top-nav">
            <button class="menu-toggle" onclick="toggleSidebar()">☰ 答题卡</button>
            <div class="q-type-badge" id="qTypeBadge">单选题</div>
            <div style="font-weight:bold; color:var(--text-desc);" id="qIndexText">1 / 102</div>
        </div>

        <div class="quiz-container" id="quizContainer">
            <div class="quiz-card">
                <div class="question" id="qText">题目加载中...</div>
                <div class="options-list" id="oList"></div>
                <div class="explanation" id="expBox"></div>
            </div>

            <div class="actions">
                <button class="btn btn-outline" id="btnPrev" onclick="goPrev()">上一题</button>
                <button class="btn btn-primary" id="btnSubmit" style="display:none;" onclick="submitMulti()">确认提交</button>
                <button class="btn btn-primary" id="btnNext" onclick="goNext()">下一题</button>
            </div>
        </div>
    </div>

    <script>
        // 102道题库数据 
        // t: 1单选 2判断 3多选 | o: 选项 | a: 正确答案索引 | exp: 解析
        const db = [
            // 一、单选题 1-34
            {t:1, q:"1.《中国共产党章程》规定，中国共产党是___的先锋队，同时是中国人民和中华民族的先锋队。", o:["中国工人阶级","新生力量","知识分子","武装力量"], a:0},
            {t:1, q:"2.党组的成员，由___的党组织决定。", o:["批准成立党组","有干部管理权限","当地党委","上级党委"], a:0},
            {t:1, q:"3.党的最高理想和最终目标是___。", o:["实现社会主义","实现共产主义","让全体人民共同富裕","社会主义现代化"], a:1},
            {t:1, q:"4.在现阶段，我国社会的主要矛盾是___。", o:["人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾","人民日益增长的物质文化需要同落后的社会生产之间的矛盾","群众生活需要同物质文化落后之间的矛盾","总需要不断增加和总供给不够充足之间的矛盾"], a:0},
            {t:1, q:"5.中国共产党在领导社会主义事业中，必须坚持以___为中心，其他各项工作都服从和服务于这个中心。", o:["经济建设","经济社会发展","农业农民农村","社会治理现代化"], a:0},
            {t:1, q:"6.___是我们的强国之路。", o:["对外开放","不断深化改革","坚持改革开放","大力发展生产力"], a:2},
            {t:1, q:"7.对党的中央委员会和地方各级委员会的委员、候补委员，给以撤销党内职务、留党察看或开除党籍处分，必须由本人所在委员会全体会议___以上的多数决定。", o:["五分之三","三分之二","三分之一","五分之三(重复)"], a:1},
            {t:1, q:"8.党是根据自己的纲领和章程，按照___组织起来的统一整体。", o:["民主集中制","马克思主义基本原则","党章","民主制度"], a:0},
            {t:1, q:"9.党的各级代表大会的代表和委员会的产生，要体现___的意志。", o:["人民","选举人","党员","领导"], a:1},
            {t:1, q:"10.党的各级代表大会代表实行___。", o:["任期制","任命制","聘任制","委任制"], a:0},
            {t:1, q:"11.党员经过留党察看，确已改正错误的，应当恢复其党员的权利；坚持错误不改的，应当___。", o:["开除工作","撤销党内职务","开除党籍","撤销党内外职务"], a:2},
            {t:1, q:"12.党的基层委员会、总支部委员会、支部委员会每届任期___。", o:["三年至五年","两年或三年","两年","三年"], a:0},
            {t:1, q:"13.留党察看最长不超过___。", o:["三年","一年","半年","两年"], a:3},
            {t:1, q:"14.___是党内的最高处分。", o:["开除党籍","留党察看","开除公职","撤销党内职务"], a:0},
            {t:1, q:"15.对党员的纪律处分，必须经过___讨论决定，报党的基层委员会批准。", o:["党委会","支委会","支部大会","党员代表会议"], a:2},
            {t:1, q:"16.关于留党察看党员的权利，表述正确的是：", o:["党员在留党察看期间没有表决权、选举权和被选举权","党员在留党察看期间没有表决权，但有选举权和被选举权","党员在留党察看期间有表决权，但没有选举权和被选举权","党员在留党察看期间有表决权、选举权和被选举权"], a:0},
            {t:1, q:"17.党章规定，党的纪律是党的___必须遵守的行为规则，是维护党的团结统一、完成党的任务的保证。", o:["基层组织","所有干部","各级组织和全体党员","领导干部"], a:2},
            {t:1, q:"18.党的中央纪律检查委员会在党的中央委员会___下进行工作。", o:["指导","帮助","领导","监督"], a:2},
            {t:1, q:"19.党的地方各级纪律检查委员会和基层纪律检查委员会在同级党的委员会和上级纪律检查委员会___下进行工作。", o:["双重指导","双重督促","双重监督","双重领导"], a:3},
            {t:1, q:"20.党的各级纪律检查委员会每届任期和___相同。", o:["同级政府","同级人大","同级政协","同级党的委员会"], a:3},
            {t:1, q:"21.党的各级纪律检查委员会要受理党员的___；保障党员的权利。", o:["控告和申诉","控告","申诉","举报"], a:0},
            {t:1, q:"22.党的各级委员会要加强对共青团的___，注意团的干部的选拔和培训。", o:["统领","指导","领导","引导"], a:2},
            {t:1, q:"23.必须坚持以___的发展思想，坚持创新、协调、绿色、开放、共享的发展理念。", o:["经济为中心","军事力量为中心","人民为中心","生态环境为中心"], a:2},
            {t:1, q:"24.在新世纪新时代，经济和社会发展的战略目标是，到新中国成立一百年时，全面建成___。", o:["小康社会","社会主义现代化强国","富裕社会主义","社会主义现代化国家"], a:1},
            {t:1, q:"25.以改革创新精神全面推进党的建设新的伟大工程，以党的___为统领。", o:["思想建设","作风建设","政治建设","纪律建设"], a:2},
            {t:1, q:"26.发展党员，必须把___放在首位，经过党的支部，坚持个别吸收原则。", o:["作风标准","政治标准","纪律标准","廉洁标准"], a:1},
            {t:1, q:"27.《党章》规定，党员如果没有正当理由，连续___不参加党的组织生活，或不交纳党费，或不做党所分配的工作，就被认为是自行脱党。", o:["3个月","6个月","12个月","24个月"], a:1},
            {t:1, q:"28.每个党员，不论职务高低，都必须编入党的一个支部、小组或其他特定组织，参加党的___，接受党内外群众的监督。", o:["支部大会","组织活动","组织生活","党小组会"], a:2},
            {t:1, q:"29.中国共产党党员是中国___的有共产主义觉悟的先锋战士。", o:["工商业者","农民阶级","工人阶级","广大群众"], a:2},
            {t:1, q:"30.中国共产党党员必须全心全意为人民服务，不惜牺牲个人的一切，为实现___奋斗终身。", o:["小康社会","现代化","共产主义","中国梦"], a:2},
            {t:1, q:"31.预备党员预备期满，需要继续考察和教育的，可以延长预备期，但不能超过___。", o:["三个月","半年","一年","两年"], a:2},
            {t:1, q:"32.预备党员的预备期，从___通过他为预备党员之日算起。", o:["支部大会","支委会","基层党委","党总支会"], a:0},
            {t:1, q:"33.党员要求退党，应当经___讨论后宣布除名，并报上级党组织备案。", o:["支委会","支部大会","基层党委","党总支会"], a:1},
            {t:1, q:"34.中央委员会全体会议由中央政治局召集，每年至少举行___次。", o:["一次","两次","三次","四次"], a:0},

            // 二、判断题 35-68
            {t:2, q:"35. 办好中国的事情，关键在党，关键在党要管党、从严治党。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"36. 坚持党的领导，首先是坚持党中央的集中统一领导。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"37. 《党章》规定，党的中央纪律检查委员会在党的中央委员会领导下进行工作。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"38. 民主集中制是民主基础上的集中和集中指导下的民主相结合。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"39. 党的地方各级纪律检查委员会如果对同级党的委员会处理案件的决定有不同意见，可以请求上一级纪委予以复查。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"40. 发挥政府在资源配置中的基础性作用，更好发挥市场作用，建立完善的宏观调控体系。", o:["正确(√)","错误(×)"], a:1, exp:"解析：《党章》总纲中明确，发挥【市场在资源配置中的决定性作用】，更好发挥政府作用。"},
            {t:2, q:"41. 在地方各级代表大会闭会期间，上级党的组织认为有必要时，可以调动或者指派下级党组织的负责人。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"42. 凡是成立党的新组织，或是撤销党的原有组织，必须由上级党组织决定。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"43. 预备党员的预备期，从上级党组织批准他为预备党员之日算起，预备期一年。", o:["正确(√)","错误(×)"], a:1, exp:"解析：《党章》规定，预备党员的预备期，从【支部大会通过】他为预备党员之日算起。"},
            {t:2, q:"44. 党的全国代表会议的职权是：讨论和决定重大问题；调整和增选中央委员会、中纪委的部分成员。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"45. 下级组织如果认为上级组织的决定不符合本地区、本部门的实际情况，可以不执行。", o:["正确(√)","错误(×)"], a:1, exp:"解析：可以请求改变；如果上级坚持原决定，【下级组织必须执行】，并不得公开发表不同意见，但有权向再上一级报告。"},
            {t:2, q:"46. 凡属重大问题都要按照集体领导、民主集中、个别酝酿、会议决定的原则，由党的委员会集体讨论，作出决定。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"47. 基层单位凡是有正式党员三人以上的，都应当成立党的基层组织。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"48. 党组织对党员作出处分决定所依据的事实材料必须同本人见面，听取本人说明情况和申辩。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"49. 党政军民学，东西南北中，党是领导一切的。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"50. 中国共产党的党徽党旗是中国共产党的象征和标志。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"51. 坚持总体国家安全观，坚决维护国家主权、安全、发展利益。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"52. 中国共产党坚持对人民解放军和其他人民武装力量的绝对领导。", o:["正确(√)","错误(×)"], a:0},
            {t:2, q:"53. 党的中央委员会委员和候补委员必须有三年以上的党龄。", o:["正确(√)","错误(×)"], a:1, exp:"解析：《党章》规定，党的中央委员会委员和候补委员必须有【五年以上】的党龄。"},

            {t:3, q:"98. 加强人民解放军的建设，坚持___，建设一支听党指挥、能打胜仗、作风优良的人民军队。", o:["政治建军","改革强军","科技兴军","依法治军"], a:[0,1,2,3]},
            {t:3, q:"99. 要按照___、互不干涉内部事务的原则，发展我党同各国共产党和其他政党的关系。", o:["独立自主","完全平等","互相尊重","互帮互助"], a:[0,1,2]},
            {t:3, q:"100. 要建设___的马克思主义执政党，使我们党始终走在时代前列。", o:["学习型","服务型","创新型","攻坚型"], a:[0,1,2]},
            {t:3, q:"101. 必须实行正确的集中，牢固树立___，坚定维护以习近平同志为核心的党中央权威和集中统一领导。", o:["政治意识","大局意识","核心意识","看齐意识"], a:[0,1,2,3]},
            {t:3, q:"102. 党要适应改革开放和社会主义现代化建设的要求，坚持___，加强和改善党的领导。", o:["执政为民","科学执政","民主执政","依法执政"], a:[1,2,3]}
        ];

        let currentIndex = 0;
        let answersState = new Array(db.length).fill(0); 

        function init() {
            const matrix = document.getElementById('qMatrix');
            matrix.innerHTML += `<div class="matrix-title">一、单选题 (1-34)</div><div class="grid" id="grid1"></div>`;
            matrix.innerHTML += `<div class="matrix-title">二、判断题 (35-68)</div><div class="grid" id="grid2"></div>`;
            matrix.innerHTML += `<div class="matrix-title">三、多选题 (69-102)</div><div class="grid" id="grid3"></div>`;

            let grid1 = document.getElementById('grid1');
            let grid2 = document.getElementById('grid2');
            let grid3 = document.getElementById('grid3');

            for (let i = 0; i < db.length; i++) {
                let div = document.createElement('div');
                div.className = 'grid-item';
                div.id = 'gItem' + i;
                div.innerText = i + 1;
                div.onclick = () => { loadQuestion(i); if(window.innerWidth <= 850) toggleSidebar(); };
                
                if (db[i].t === 1) grid1.appendChild(div);
                else if (db[i].t === 2) grid2.appendChild(div);
                else grid3.appendChild(div);
            }
            loadQuestion(0);
        }

        function loadQuestion(index) {
            currentIndex = index;
            const q = db[index];
            
            document.querySelectorAll('.grid-item').forEach(el => el.classList.remove('active'));
            document.getElementById('gItem' + index).classList.add('active');
            
            const typeNames = ["单选题", "判断题", "多选题"];
            document.getElementById('qTypeBadge').innerText = typeNames[q.t - 1];
            document.getElementById('qIndexText').innerText = `${index + 1} / 102`;
            
            document.getElementById('qText').innerText = q.q;
            document.getElementById('expBox').classList.remove('show');
            
            const oList = document.getElementById('oList');
            oList.innerHTML = '';
            
            const letters = ['A', 'B', 'C', 'D', 'E'];
            q.o.forEach((optText, i) => {
                let optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.id = 'opt' + i;
                let prefix = q.t === 2 ? "" : `<div class="option-letter">${letters[i]}.</div>`;
                optDiv.innerHTML = `${prefix} <div>${optText}</div>`;
                optDiv.onclick = () => handleSelect(i, q.t);
                oList.appendChild(optDiv);
            });

            document.getElementById('btnSubmit').style.display = (q.t === 3 && answersState[index] === 0) ? 'block' : 'none';
            document.getElementById('btnPrev').disabled = index === 0;
            document.getElementById('btnNext').disabled = index === db.length - 1;

            if(answersState[index] !== 0) showResult(q);
        }

        function handleSelect(optIndex, type) {
            if(answersState[currentIndex] !== 0) return;
            if (type === 1 || type === 2) {
                checkSingleAnswer(optIndex);
            } else {
                document.getElementById('opt' + optIndex).classList.toggle('selected');
            }
        }

        function checkSingleAnswer(selectedIdx) {
            const q = db[currentIndex];
            const isCorrect = (selectedIdx === q.a);
            answersState[currentIndex] = isCorrect ? 1 : -1;
            updateStats();
            showResult(q, selectedIdx);
        }

        function submitMulti() {
            const q = db[currentIndex];
            const selectedEls = document.querySelectorAll('.option.selected');
            if(selectedEls.length === 0) return alert("请至少选择一个选项！");

            let selectedIds = [];
            selectedEls.forEach(el => selectedIds.push(parseInt(el.id.replace('opt', ''))));
            
            selectedIds.sort();
            let correctIds = [...q.a].sort();
            const isCorrect = (JSON.stringify(selectedIds) === JSON.stringify(correctIds));

            answersState[currentIndex] = isCorrect ? 1 : -1;
            document.getElementById('btnSubmit').style.display = 'none';
            updateStats();
            showResult(q, selectedIds);
        }

        function showResult(q, userSelected = null) {
            const isCorrect = answersState[currentIndex] === 1;
            const gridItem = document.getElementById('gItem' + currentIndex);
            gridItem.classList.add(isCorrect ? 'correct' : 'error');

            document.querySelectorAll('.option').forEach(el => {
                el.classList.add('disabled');
                el.onclick = null;
            });

            if (q.t === 1 || q.t === 2) {
                document.getElementById('opt' + q.a).classList.add('correct-ans');
                if(!isCorrect && userSelected !== null && userSelected !== q.a) {
                    document.getElementById('opt' + userSelected).classList.add('wrong-ans');
                }
            } else {
                q.a.forEach(idx => document.getElementById('opt' + idx).classList.add('correct-ans'));
                if(!isCorrect && userSelected !== null) {
                    userSelected.forEach(idx => {
                        if(!q.a.includes(idx)) document.getElementById('opt' + idx).classList.add('wrong-ans');
                    });
                }
            }

            if(q.exp && !isCorrect) {
                const expBox = document.getElementById('expBox');
                expBox.innerText = q.exp;
                expBox.classList.add('show');
            }
            
            // 滚动到底部方便看下一题
            setTimeout(() => {
                document.getElementById('quizContainer').scrollTo({ top: 9999, behavior: 'smooth' });
            }, 100);
        }

        function updateStats() {
            let done = 0, correct = 0;
            answersState.forEach(s => {
                if(s !== 0) done++;
                if(s === 1) correct++;
            });
            document.getElementById('statDone').innerText = `${done}/102`;
            document.getElementById('statAcc').innerText = done === 0 ? "0%" : Math.round((correct/done)*100) + "%";
        }

        function goPrev() { if(currentIndex > 0) loadQuestion(currentIndex - 1); }
        function goNext() { if(currentIndex < db.length - 1) loadQuestion(currentIndex + 1); }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mask').classList.toggle('show');
        }

        window.onload = init;
    </script>
